version: "3.9"

services:
  central_server:
    build: ./central_server
    container_name: central_server
    ports:
      - "42069:42069"
    environment:
      IP_ADDRESS: 0.0.0.0
      PORT: 42069
      PSK: asd

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  prod_admin:
    build:
      context: ./product_administration
      args:
        VITE_STORE_ADMIN_URL: http://localhost:8000
    container_name: prod_admin
    ports:
      - "10000:80"
    environment:
      PSK: asd
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_NAME: netstore

    depends_on:
      mysql:
        condition: service_healthy

  store_admin:
    build:
      context: ./store_administration
      args:
        VITE_PROD_ADMIN_ORIGIN: http://localhost:10000
    container_name: store_admin
    ports:
      - "8000:8000"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_PROTOCOL: tcp
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: netstore
      CENTRAL_SERVER_ADDRESS: central_server
      CENTRAL_SERVER_PORT: 42069
      PSK: asd
      PROD_ADMIN_FILTER_ENDPOINT: http://prod_admin/api/search_product
    depends_on:
      mysql:
        condition: service_healthy

  mysql2:
    image: mysql:8.0
    container_name: mysql2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data2:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  prod_admin2:
    build:
      context: ./product_administration
      args:
        VITE_STORE_ADMIN_URL: http://localhost:11000
    container_name: prod_admin2
    ports:
      - "12000:80"
    environment:
      PSK: asd
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql2
      DB_NAME: netstore

    depends_on:
      mysql2:
        condition: service_healthy

  store_admin2:
    build:
      context: ./store_administration
      args:
        VITE_PROD_ADMIN_ORIGIN: http://localhost:12000
    container_name: store_admin2
    ports:
      - "11000:8000"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_PROTOCOL: tcp
      DB_HOST: mysql2
      DB_PORT: 3306
      DB_NAME: netstore
      CENTRAL_SERVER_ADDRESS: central_server
      CENTRAL_SERVER_PORT: 42069
      PSK: asd
      PROD_ADMIN_FILTER_ENDPOINT: http://prod_admin2/api/search_product
    depends_on:
      mysql2:
        condition: service_healthy

volumes:
  mysql_data:
  mysql_data2:
