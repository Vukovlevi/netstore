version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  central_server:
    build: ./central_server
    container_name: central_server
    ports:
      - "42069:42069"
    environment:
      IP_ADDRESS: 0.0.0.0
      PORT: 42069
      PSK: asd

  # product_app:
  #   build: ./product_administration
  #   container_name: product_app
  #   ports:
  #     - "8000:80"
  #   depends_on:
  #     - mysql

  store_admin:
    build: ./store_administration
    container_name: store_admin
    ports:
      - "8000:8000"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_PROTOCOL: tcp
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: netstore
      CENTRAL_SERVER_ADDRESS: central_server
      CENTRAL_SERVER_PORT: 42069
      PSK: asd
      PROD_ADMIN_FILTER_ENDPOINT: http://product_app/api/search_product
    depends_on:
      - mysql
      - central_server

volumes:
  mysql_data:
